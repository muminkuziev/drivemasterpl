databases:
  - name: drivemaster-db
    databaseName: drivemaster
    plan: basic-256mb
    region: frankfurt

services:
  - type: web
    name: drivemaster
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: bash render-build.sh
    startCommand: cd apps/api && npm run start:prod
    preDeployCommand: cd apps/api && npx prisma migrate deploy
    disk:
      name: drivemaster-media
      mountPath: /var/data/media
      sizeGB: 15
    envVars:
      - key: NODE_ENV
        value: production
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: DATABASE_URL
        fromDatabase:
          name: drivemaster-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ADMIN_BLIK_PHONE
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TRANSLATOR_ENABLED
        value: "true"
      - key: TRANSLATOR_FREE_TOTAL_LIMIT
        value: "3"
      - key: TRANSLATOR_PREMIUM_DAILY_LIMIT
        value: "20"
